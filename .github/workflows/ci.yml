name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: sqlite:///./test_snapl.db
      REDIS_URL: ""
      BASE_URL: http://localhost:8000
      JWT_SECRET: test-secret

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint
        run: ruff check app tests

      - name: Test
        run: pytest tests/ -v --tb=short

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t snapl:${{ github.sha }} .

      - name: Smoke test
        run: |
          docker run -d --name snapl_smoke \
            -e DATABASE_URL=sqlite:///./smoke.db \
            -e REDIS_URL="" \
            -e BASE_URL=http://localhost:8000 \
            -e JWT_SECRET=smoke-secret \
            -p 8000:8000 \
            snapl:${{ github.sha }}
          sleep 5
          curl --fail http://localhost:8000/docs
          docker stop snapl_smoke
